<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Booking Manager</title>
<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f1f5f9;
    color: #0f172a;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 220px;
    background: #ffffff;
    padding: 20px;
}

.tab {
    padding: 12px;
    margin-bottom: 10px;
    background: #f8fafc;
    color: #0f172a;
    cursor: pointer;
    border-radius: 8px;
}

.tab:hover {
    background: #e2e8f0;
}

.content {
    flex: 1;
    padding: 20px;
    background: white;
}

/* Top Controls */
.topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
}

button {
    background: #3b82f6;
    border: none;
    padding: 8px 12px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
button.delete {
    background: #ef4444;
}

button.update {
    background: #22c55e;
}
button:hover {
    background: #2563eb;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #334155;
    padding: 10px;
    vertical-align: top;
}

.day-cell {
    height: 100px;
}

/* Booking button */
.booking {
    display: block;
    background: #3b82f6;
    color: white;
    margin: 4px 0;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #0f172a;
    padding: 20px;
    border-radius: 10px;
    display: none;
    width: 300px;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="tab" onclick="showTab('week')">Weekly View</div>
        <div class="tab" onclick="showTab('month')">Monthly View</div>
        <div class="tab" onclick="showTab('addK')">Add K</div>
        <div class="tab" onclick="showTab('addP')">Add P</div>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Top Bar -->
        <div class="topbar">
            <button onclick="changeWeek(-7)">⬅</button>
            <input type="date" id="datePicker">
            <button onclick="changeWeek(7)">➡</button>
        </div>

        <!-- Weekly -->
        <div id="weekView"></div>

        <!-- Monthly -->
        <div id="monthView" style="display:none;"></div>
<div id="addK" style="display:none;">
<h2>Add Booking (K)</h2>

SID: <input id="k_sid"><br>
Name: <input id="k_name"><br>
Phone: <input id="k_phone"><br>

Grade:
<select id="k_grade">
<option>P1</option>
<option>P2</option>
</select><br>

Date: <input type="date" id="k_date"><br>
Hour: <input id="k_hour"><br>
Minute: <input id="k_min"><br>

Status:
<select id="k_status">
<option>Pending</option>
<option>Done</option>
</select><br>

Instructor: <input id="k_ins"><br>

<button onclick="addRow('K')">Submit</button>
</div>

<div id="addP" style="display:none;">
<h2>Add Booking (P)</h2>

SID: <input id="p_sid"><br>
Name: <input id="p_name"><br>
Phone: <input id="p_phone"><br>

Grade:
<select id="p_grade">
<option>P1</option>
<option>P2</option>
</select><br>

Date: <input type="date" id="p_date"><br>
Hour: <input id="p_hour"><br>
Minute: <input id="p_min"><br>

Status:
<select id="p_status">
<option>Pending</option>
<option>Done</option>
</select><br>

Instructor: <input id="p_ins"><br>

<button onclick="addRow('P')">Submit</button>
</div>
    </div>
</div>

<!-- Popup -->
<div class="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup"></div>

<script>
// ===== CONFIG =====
const SHEET_K_URL = "https://docs.google.com/spreadsheets/d/1Fsn_TK0mA0dZ21kgH7qOFaBy1xwm0Hl8KyxEH5tHYwo/gviz/tq?tqx=out:csv&sheet=P1/G1-S6/G13";
const SHEET_P_URL = "https://docs.google.com/spreadsheets/d/1Fsn_TK0mA0dZ21kgH7qOFaBy1xwm0Hl8KyxEH5tHYwo/gviz/tq?tqx=out:csv&sheet=PN-K3/K-MO";

let dataK = [];
let dataP = [];
let currentDate = new Date();

// ===== Fetch Data =====
async function loadData() {
    try {
        const kRes = await fetch(SHEET_K_URL);
        const kText = await kRes.text();
        const pRes = await fetch(SHEET_P_URL);
        const pText = await pRes.text();
        dataK = parseCSV(kText);
        dataP = parseCSV(pText);

        renderWeek();
        renderMonth();
    } catch (err) {
        console.error("Fetch error:", err);
    }
}

// ===== CSV Parser =====
function parseCSV(text) {
    const rows = text.split("\n").map(r => r.split(","));
    return rows.slice(1).map((r, i) => ({
        row: i + 2,
        SID: r[1],
        name: r[2],
        phone: r[0],
        grade: r[6],
        remark: r[4],
        date: normalizeDate(r[7]),
        hour: r[4],
        minute: r[5],
        status: r[12],
        instructor: r[13]
    }));
}

// ===== Weekly View =====
function renderWeek() {
    const container = document.getElementById("weekView");
    container.innerHTML = "";

    let start = new Date(currentDate);
    start.setDate(start.getDate() - start.getDay());

    let table = "<table><tr>";

    for (let i = 0; i < 7; i++) {
        let d = new Date(start);
        d.setDate(start.getDate() + i);
        table += `<th>${d.toDateString()}</th>`;
    }
    table += "</tr>";

    // K row
    table += "<tr>";
    for (let i = 0; i < 7; i++) {
        let d = formatDate(start, i);
        table += `<td>${renderCell(dataK, d)}</td>`;
    }
    table += "</tr>";

    // P row
    table += "<tr>";
    for (let i = 0; i < 7; i++) {
        let d = formatDate(start, i);
        table += `<td>${renderCell(dataP, d)}</td>`;
    }
    table += "</tr>";

    table += "</table>";
    container.innerHTML = table;
}

function normalizeDate(str) {
    if (!str) return "";

    // Match: 2026年4月10日
    const match = str.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);

    if (!match) return "";

    const y = match[1];
    const m = match[2].padStart(2, "0");
    const d = match[3].padStart(2, "0");

    return `${y}-${m}-${d}`;
}

function renderCell(data, date) {
    return data
        .filter(x => x.date === date)
        .map(x => `
            <div class="booking" onclick='showPopup(${JSON.stringify(x)})'>
                ${x.SID || ""} ${x.name}<br>
                ${x.grade} ${x.hour}:${x.minute}
            </div>
        `).join("");
}

// ===== Monthly View =====
function renderMonth() {
    const container = document.getElementById("monthView");
    container.innerHTML = "";

    let d = new Date(currentDate);
    let year = d.getFullYear();
    let month = d.getMonth();

    let firstDay = new Date(year, month, 1).getDay();
    let days = new Date(year, month + 1, 0).getDate();

    let table = "<table><tr>";

    for (let i = 0; i < firstDay; i++) table += "<td></td>";

    for (let day = 1; day <= days; day++) {
        let fullDate = `${year}-${pad(month+1)}-${pad(day)}`;

        let bookings = [...dataK, ...dataP].filter(x => x.date === fullDate);

        table += `<td class="day-cell">
            <b>${day}</b><br>
            ${bookings.map(b => `<div class="booking">${b.SID}</div>`).join("")}
        </td>`;

        if ((day + firstDay) % 7 === 0) table += "</tr><tr>";
    }

    table += "</tr></table>";
    container.innerHTML = table;
}

// ===== Helpers =====
function formatDate(start, offset) {
    let d = new Date(start);
    d.setDate(d.getDate() + offset);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) {
    return n.toString().padStart(2, '0');
}

// ===== Popup =====
function showPopup(data, sheetName) {
    document.querySelector(".overlay").style.display = "block";
    const popup = document.getElementById("popup");

    popup.innerHTML = `
        <h3>${data.name}</h3>

        Grade: <input id="grade" value="${data.grade}"><br>
        Hour: <input id="hour" value="${data.hour}"><br>
        Minute: <input id="minute" value="${data.minute}"><br>
        Status: <input id="status" value="${data.status}"><br>
        Instructor: <input id="instructor" value="${data.instructor}"><br>

        <br>
        <button class="update" onclick='updateRow(${JSON.stringify(data)}, "${sheetName}")'>Update</button>
        <button class="delete" onclick='deleteRow(${data.row}, "${sheetName}")'>Delete</button>
        <button onclick="closePopup()">Close</button>
    `;

    popup.style.display = "block";
}

function closePopup() {
    document.querySelector(".overlay").style.display = "none";
    document.getElementById("popup").style.display = "none";
}

// ===== Navigation =====
function changeWeek(offset) {
    currentDate.setDate(currentDate.getDate() + offset);
    renderWeek();
}

function showTab(tab) {
    document.getElementById("weekView").style.display = tab === 'week' ? "block" : "none";
    document.getElementById("monthView").style.display = tab === 'month' ? "block" : "none";
}
const API_URL = "https://script.google.com/macros/s/AKfycbzhnMSoseKulqNqZ6yKDn2irFcS53EUIN8at-IVaQQl9AYm_5FaIAcyZAl63siVSRxc/exec";

async function updateRow(data, sheet) {
    const values = [
        data.SID,
        data.name,
        data.phone,
        document.getElementById("grade").value,
        data.remark,
        data.rawDate || data.date,
        document.getElementById("hour").value,
        document.getElementById("minute").value,
        document.getElementById("status").value,
        document.getElementById("instructor").value
    ];

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "update",
            sheet: sheet,
            row: data.row,
            values: values
        })
    });

    alert("Updated!");
    loadData();
}

async function deleteRow(row, sheet) {
    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "delete",
            sheet: sheet,
            row: row
        })
    });

    alert("Deleted!");
    loadData();
}
async function addRow(type) {
    const prefix = type.toLowerCase();

    const values = [
        document.getElementById(prefix+"_sid").value,
        document.getElementById(prefix+"_name").value,
        document.getElementById(prefix+"_phone").value,
        document.getElementById(prefix+"_grade").value,
        "",
        document.getElementById(prefix+"_date").value,
        document.getElementById(prefix+"_hour").value,
        document.getElementById(prefix+"_min").value,
        document.getElementById(prefix+"_status").value,
        document.getElementById(prefix+"_ins").value
    ];

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "add",
            sheet: type === "K" ? "SheetK" : "SheetP",
            values: values
        })
    });

    alert("Added!");
    loadData();
}
// ===== Init =====
document.getElementById("datePicker").valueAsDate = currentDate;
document.getElementById("datePicker").onchange = e => {
    currentDate = new Date(e.target.value);
    renderWeek();
    renderMonth();
};

loadData();
</script>

</body>
</html>
